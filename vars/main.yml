---

# vars file for Windows-2025-CIS

# Used to control warning summary
warn_control_list: ""
warn_count: 0

# lockdown_banner sets the variable that is created for the banner.
lockdown_banner: "{{ lookup('file', './templates/banner.txt') }}"

# prelim_win25cis_cloud_based_system will be changed to true if discovered.
prelim_win25cis_cloud_based_system: false

# These are default values that will be changed when the prelim
# runs and finds the correct setting.
prelim_win25cis_is_standalone: false
prelim_win25cis_is_domain_controller: false
prelim_win25cis_is_domain_member: false

# Default setting, this should not be changed
# and is overridden if a task that changed sets the value if required.
reboot_host: false

# This section will change based on OS and Version of CIS that is being used.
win25cis_gpo_hardening_version: "v1.0.0"
win25cis_gpo_hardening_os: "Win2025"

# This section will configure the names of the GPOs that are created to a variable for easier reading in the when
# statements for each task for GPO creation.
# THE DEFAULT SETTINGS BELOW SHOULD NOT BE CHANGED.
win25cis_default_domain_policy_gpo_name: "CIS {{ win25cis_gpo_hardening_version }} {{ win25cis_gpo_hardening_os }} Default Domain Policy"

win25cis_l1_dc_gpo_name: "CIS {{ win25cis_gpo_hardening_version }} {{ win25cis_gpo_hardening_os }} L1 DC"
win25cis_l1_ms_gpo_name: "CIS {{ win25cis_gpo_hardening_version }} {{ win25cis_gpo_hardening_os }} L1 MS"

win25cis_l2_dc_gpo_name: "CIS {{ win25cis_gpo_hardening_version }} {{ win25cis_gpo_hardening_os }} L2 DC"
win25cis_l2_ms_gpo_name: "CIS {{ win25cis_gpo_hardening_version }} {{ win25cis_gpo_hardening_os }} L2 MS"

win25cis_l1_dm_gpo_name: "CIS {{ win25cis_gpo_hardening_version }} {{ win25cis_gpo_hardening_os }} L1 DM"

win25cis_services_dc_gpo_name: "CIS {{ win25cis_gpo_hardening_version }} {{ win25cis_gpo_hardening_os }} Services DC"
win25cis_services_ms_gpo_name: "CIS {{ win25cis_gpo_hardening_version }} {{ win25cis_gpo_hardening_os }} Services MS"

win25cis_ngws_dc_gpo_name: "CIS {{ win25cis_gpo_hardening_version }} {{ win25cis_gpo_hardening_os }} NGWS DC"
win25cis_ngws_ms_gpo_name: "CIS {{ win25cis_gpo_hardening_version }} {{ win25cis_gpo_hardening_os }} NGWS MS"

win25cis_l1_user_gpo_name: "CIS {{ win25cis_gpo_hardening_version }} {{ win25cis_gpo_hardening_os }} L1 User"
win25cis_l2_user_gpo_name: "CIS {{ win25cis_gpo_hardening_version }} {{ win25cis_gpo_hardening_os }} L2 User"
